<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Психологічний тест</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Психологічний тест</h1>

    <div id="start">
      <h2>Оберіть тест</h2>
      <button class="primary" onclick="startTest('pcl5')">PCL-5 (ПТСР)</button>
      <button class="primary" onclick="startTest('minmult')">Міні-Мульт</button>
      <button class="primary" onclick="startTest('schmishek')">Шмішек (акцентуації)</button>
    </div>

    <div id="test" style="display:none;">
      <h2 id="title"></h2>
      <p id="question"></p>
      <div id="options" class="options"></div>
      <button id="next" class="primary" disabled onclick="nextQuestion()">Наступне</button>
      <div id="progress">Питання <span id="current">1</span> з <span id="total">20</span></div>
    </div>

    <div id="result" style="display:none;">
      <h2>Результати</h2>
      <p id="resultText"></p>
      <button class="primary" onclick="downloadPDF()">Завантажити PDF</button>
      <button class="primary" onclick="sendToDoctor()">Надіслати лікарю</button>
      <button class="secondary" onclick="restart()">Пройти ще раз</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
